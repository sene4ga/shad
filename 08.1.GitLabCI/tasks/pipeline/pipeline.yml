stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip

cache:
  key:
    files:
      - requirements.txt
    prefix: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
  paths:
    - .cache/pip

.python:
  image: python:3.12

lint:
  extends: .python
  stage: lint
  script:
    - pip install ruff
    - ruff check .

test:
  extends: .python
  stage: test
  script:
    - pip install -r requirements.txt
    - pytest --junitxml=report.xml --cov=. --cov-report=xml:coverage.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

build:
  extends: .python
  stage: build
  script:
    - tar -czf build.tar.gz app.py requirements.txt pyproject.toml tests/
  artifacts:
    paths:
      - build.tar.gz
    expire_in: 1 week

package:
  extends: .python
  stage: build
  needs: [build]
  script:
    - cp build.tar.gz package.tar.gz
  artifacts:
    paths:
      - package.tar.gz
    expire_in: 1 week

deploy-staging:
  extends: .python
  stage: deploy
  script:
    - echo "Deploying to staging"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  extends: .python
  stage: deploy
  script:
    - echo "Deploying to production"
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual